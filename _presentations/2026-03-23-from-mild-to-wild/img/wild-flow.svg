<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 120" width="680" height="120">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
  <!-- Tekton PipelineRun -->
  <rect x="10" y="25" width="145" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="82" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1565c0">Tekton PipelineRun</text>
  <text x="82" y="63" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">tasks (bundle@sha256)</text>
  <text x="82" y="77" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">build-container</text>
  <text x="82" y="89" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">clone-repository …</text>

  <!-- Arrow -->
  <line x1="157" y1="60" x2="195" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tekton Chains -->
  <rect x="198" y="30" width="130" height="60" rx="8" fill="#fce4ec" stroke="#880e4f" stroke-width="1.5"/>
  <text x="263" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#880e4f">Tekton Chains</text>
  <text x="263" y="67" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">observer — signs</text>
  <text x="263" y="81" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">SLSA provenance</text>

  <!-- Arrow -->
  <line x1="330" y1="60" x2="368" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Conforma -->
  <rect x="370" y="20" width="135" height="80" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="437" y="43" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Conforma</text>
  <text x="390" y="58" font-family="sans-serif" font-size="10" fill="#333">Check task bundle refs</text>
  <text x="390" y="71" font-family="sans-serif" font-size="10" fill="#333">against allowlist</text>
  <text x="390" y="86" font-family="sans-serif" font-size="10" fill="#333">→ all trusted? PASS</text>

  <!-- Arrow -->
  <line x1="507" y1="60" x2="545" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="548" y="30" width="120" height="60" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="608" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Trust qualified</text>
  <text x="608" y="67" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Pinned tasks →</text>
  <text x="608" y="81" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">deterministic build</text>
</svg>
