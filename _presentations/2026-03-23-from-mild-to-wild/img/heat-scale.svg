<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140" width="700" height="140">
  <!-- Background -->
  <defs>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f44336;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gradient bar -->
  <rect x="40" y="50" width="620" height="30" rx="15" fill="url(#scaleGrad)" />
  <!-- Mild label -->
  <text x="120" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#2e7d32">🌶 Mild</text>
  <text x="120" y="105" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#555">Presence &amp; validity</text>
  <!-- Medium label -->
  <text x="350" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e65100">🌶🌶 Medium</text>
  <text x="350" y="105" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#555">Content &amp; enforcement</text>
  <!-- Wild label -->
  <text x="575" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#b71c1c">🌶🌶🌶 Wild</text>
  <text x="575" y="105" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#555">Trusted task chains</text>
  <!-- Tick marks -->
  <line x1="120" y1="48" x2="120" y2="82" stroke="white" stroke-width="2"/>
  <line x1="350" y1="48" x2="350" y2="82" stroke="white" stroke-width="2"/>
  <line x1="575" y1="48" x2="575" y2="82" stroke="white" stroke-width="2"/>
</svg>
