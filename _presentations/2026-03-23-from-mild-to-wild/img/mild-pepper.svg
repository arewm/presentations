<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="120" height="156">
  <defs>
    <linearGradient id="mStem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5FD2DB"/>
      <stop offset="100%" stop-color="#3BA8B0"/>
    </linearGradient>
  </defs>
  <!-- Stem — curved, off-center like the reference -->
  <path d="M120,12 C118,4 110,0 104,2 C98,4 94,12 94,22 C94,40 96,58 96,72 L108,72 L108,36
           C108,28 112,22 118,20 C122,18 124,14 120,12Z"
        style="fill:url(#mStem)"/>
  <!-- Three overlapping lobes like the bell pepper reference -->
  <!-- Center lobe -->
  <path d="M144,120 C144,170 118,240 100,240 S56,170 56,120 S78,50 100,50 S144,70 144,120Z"
        style="fill:#66BB6A"/>
  <!-- Left lobe — shifted left, slightly rotated -->
  <path d="M16,128 C20,198 48,238 80,236 S110,170 106,100 C102,46 78,38 50,40 C22,42 12,58 16,128Z"
        style="fill:#4CAF50"/>
  <!-- Right lobe — shifted right -->
  <path d="M184,128 C180,198 152,238 120,236 S90,170 94,100 C98,46 122,38 150,40 C178,42 188,58 184,128Z"
        style="fill:#4CAF50"/>
  <!-- Highlight on left lobe -->
  <path d="M40,80 C38,100 36,130 42,170 C46,190 54,210 62,224"
        stroke="#A5D6A7" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Small specular -->
  <ellipse cx="44" cy="100" rx="4" ry="8" fill="white" opacity="0.2" transform="rotate(-10 44 100)"/>
  <!-- Label -->
  <text x="100" y="256" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#2e7d32" font-weight="bold">MILD</text>
</svg>
