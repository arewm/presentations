  <text x="65" y="68" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">+ attestations</text>
  <!-- Arrow -->
  <line x1="122" y1="55" x2="158" y2="55" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
