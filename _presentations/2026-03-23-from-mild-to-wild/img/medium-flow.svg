<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" width="700" height="130">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
  <!-- OCI Image -->
  <rect x="10" y="30" width="100" height="60" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="60" y="55" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1565c0">OCI Image</text>
  <text x="60" y="72" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">+ provenance</text>
  <!-- Arrow -->
  <line x1="112" y1="60" x2="145" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Verify box -->
  <rect x="148" y="20" width="130" height="80" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="213" y="42" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Policy Engine</text>
  <text x="213" y="58" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Same mild checks:</text>
  <text x="213" y="72" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">provenance, builder,</text>
  <text x="213" y="86" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">source, params</text>
  <!-- Arrow -->
  <line x1="280" y1="60" x2="313" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Create VSA -->
  <rect x="316" y="25" width="130" height="70" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="381" y="48" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6a1b9a">Create VSA</text>
  <text x="381" y="65" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">SLSA_BUILD_LEVEL_2</text>
  <text x="381" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">sign + attach</text>
  <!-- Arrow -->
  <line x1="448" y1="60" x2="480" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Consumers -->
  <rect x="483" y="15" width="200" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="583" y="38" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Downstream Consumers</text>
  <text x="503" y="58" font-family="sans-serif" font-size="10" fill="#333">&#x2022; Admission controller</text>
  <text x="503" y="74" font-family="sans-serif" font-size="10" fill="#333">&#x2022; Registry gate</text>
  <text x="503" y="90" font-family="sans-serif" font-size="10" fill="#333">&#x2022; Downstream verifier</text>
  <text x="503" y="106" font-family="sans-serif" font-size="10" fill="#2e7d32" font-style="italic">Check VSA, not re-verify</text>
</svg>
