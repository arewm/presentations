<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 130" width="680" height="130">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
  <!-- Inputs column -->
  <rect x="10" y="10" width="120" height="45" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="70" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1565c0">Provenance</text>
  <text x="70" y="46" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">SLSA attestation</text>

  <rect x="10" y="70" width="120" height="45" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="70" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1565c0">SBOM</text>
  <text x="70" y="106" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">CycloneDX attest.</text>

  <!-- Arrows from inputs -->
  <line x1="132" y1="32" x2="175" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="132" y1="92" x2="175" y2="65" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AMPEL box -->
  <rect x="178" y="40" width="120" height="50" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="238" y="62" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">AMPEL</text>
  <text x="238" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">policy evaluation</text>

  <!-- Arrow -->
  <line x1="300" y1="65" x2="338" y2="65" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- VSA/SVR box -->
  <rect x="340" y="35" width="130" height="60" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="405" y="57" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6a1b9a">VSA / SVR</text>
  <text x="405" y="73" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">signed summary</text>
  <text x="405" y="87" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">attestation output</text>

  <!-- Arrow -->
  <line x1="472" y1="65" x2="510" y2="65" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Consumer box -->
  <rect x="512" y="25" width="155" height="80" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="589" y="48" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Consumers</text>
  <text x="535" y="65" font-family="sans-serif" font-size="10" fill="#333">• Admission controller</text>
  <text x="535" y="80" font-family="sans-serif" font-size="10" fill="#333">• Registry policy</text>
  <text x="535" y="95" font-family="sans-serif" font-size="10" fill="#333">• Downstream verifier</text>
</svg>
